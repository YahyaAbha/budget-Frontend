<div class="flex items-center justify-center min-h-screen bg-slate-50 px-4">
  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-100">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Create an Account</h2>
      <p class="text-sm text-slate-500 mt-1">Please enter your details to sign up.</p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="signUp()" class="space-y-5">
      <div>
        <label for="name" class="block text-sm font-semibold text-slate-700 mb-1.5">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="John Doe"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-100 transition-all duration-200"
          formControlName="name"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-100 transition-all duration-200"
          formControlName="email"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5"
          >Password</label
        >
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:border-violet-500 focus:ring-4 focus:ring-violet-100 transition-all duration-200"
          formControlName="password"
        />
      </div>

      <button
        type="submit"
        class="w-full mt-2 bg-violet-600 hover:bg-violet-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-violet-200 hover:shadow-none transition-all duration-200 active:scale-[0.98]"
      >
        Sign Up
      </button>
    </form>
  </div>
</div>
